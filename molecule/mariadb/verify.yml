---
- name: Verify Semaphore UI systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Semaphore UI service to become active (up to 180s)
      ansible.builtin.systemd:
        name: semaphore.service
      register: semaphore_service
      until: semaphore_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Semaphore UI service is active
      ansible.builtin.assert:
        that: semaphore_service.status.ActiveState == 'active'
        fail_msg: "semaphore.service not active ({{ semaphore_service.status.ActiveState }})"
        success_msg: "semaphore.service is active"

    - name: Retrieve Semaphore UI service log for debugging
      when: semaphore_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu semaphore.service
      changed_when: false

    - name: Wait for Semaphore UI HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:3000/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: semaphore_endpoint
      until: semaphore_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Semaphore UI HTTP endpoint responds
      ansible.builtin.assert:
        that: semaphore_endpoint.status in [200, 302]
        fail_msg: "Semaphore UI did not respond as expected ({{ semaphore_endpoint.status | default('no response') }})"
        success_msg: "Semaphore UI responded with {{ semaphore_endpoint.status }}"

    - name: Show Semaphore UI systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Semaphore UI systemd: {{ semaphore_service.status.ActiveState }}"
          - "Semaphore UI HTTP: {{ semaphore_endpoint.status }}"
