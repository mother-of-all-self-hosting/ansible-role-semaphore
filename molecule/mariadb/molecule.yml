---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: semaphore-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        semaphore_debug_service_enabled: true

        # Variables for Semaphore UI
        semaphore_uid: 1000
        semaphore_gid: 1000
        semaphore_hostname: localhost
        semaphore_container_labels_traefik_enabled: false
        semaphore_container_http_host_bind_port: 3000
        semaphore_admin_username: username
        semaphore_admin_password: password
        semaphore_admin_name: name
        semaphore_admin_email: example@example.com
        semaphore_access_key_encryption: SZzA3p6dEkpO3MP3w+OI3iUDalRtGX8B93TMmJj/ojk=
        semaphore_database_type: mysql

        # Variables required for Semaphore UI to connect to the MariaDB database
        semaphore_database_mysql_hostname: "{{ mariadb_connection_hostname }}"
        semaphore_database_mysql_port: "{{ mariadb_connection_port }}"
        semaphore_database_mysql_username: my_database_username
        semaphore_database_mysql_password: my_database_password
        semaphore_database_name: semaphore
        semaphore_systemd_required_services_list_auto: |
          {{
            (['mariadb.service'])
          }}

        # Variables for MariaDB
        mariadb_uid: 1000
        mariadb_gid: 1000
        mariadb_root_password: mariadb_password
        mariadb_container_network: "{{ semaphore_container_network }}"
        mariadb_managed_databases: |
          {{
            [{
              'name': semaphore_database_name,
              'username': semaphore_database_mysql_username,
              'password': semaphore_database_mysql_password,
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-mariadb
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
